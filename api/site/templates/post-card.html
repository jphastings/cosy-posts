{{define "post-card"}}
<article class="post" data-post-id="{{.ID}}">
  {{if .Media}}
    <div class="carousel" data-count="{{len .Media}}">
      <div class="carousel-track">
        {{range .Media}}
          <div class="carousel-slide">
            {{if .IsVideo}}
              <video src="{{.URL}}" controls playsinline preload="metadata"></video>
            {{else}}
              <img src="{{.URL}}" alt="" loading="lazy">
            {{end}}
          </div>
        {{end}}
      </div>
      {{if gt (len .Media) 1}}
        <button class="carousel-prev" aria-label="Previous">&lsaquo;</button>
        <button class="carousel-next" aria-label="Next">&rsaquo;</button>
        <div class="carousel-dots">
          {{range $i, $m := .Media}}
            <span class="dot{{if eq $i 0}} active{{end}}"></span>
          {{end}}
        </div>
      {{end}}
    </div>
  {{end}}
  <div class="post-actions">
    <div class="post-actions-left">
      {{if .AuthorName}}
        <strong class="post-author-name">{{.AuthorName}}</strong>
        <a class="contact-btn" href="#" target="_blank" rel="noopener" data-author="{{.Author}}" data-post-url="{{.URL}}">
          <span class="contact-icon">
            <img src="/img/whatsapp.svg" alt=""></span>
          <span class="contact-label">Send a message</span>
        </a>
      {{end}}
    </div>
    <button class="bookmark-btn" aria-label="Bookmark">
      <img src="/img/bookmark.svg" alt=""></button>
  </div>
  {{if .BodyHTML}}
    <div class="post-body">
      {{.BodyHTML}}
    </div>
  {{end}}
  <time class="post-date" datetime="{{.ISODate}}">
    {{.ReadableDate}}
  </time>
</article>
{{end}}
