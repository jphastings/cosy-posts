name: CosyPostsAdmin
options:
  bundleIdPrefix: me.byjp.cosyposts
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.42.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    DEVELOPMENT_TEAM: 7L3537S658
    CODE_SIGN_STYLE: Automatic

packages:
  PactSwift:
    url: https://github.com/surpher/PactSwift
    from: "1.0.0"

targets:
  CosyPostsAdmin:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/CosyPostsAdmin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.byjp.cosyposts.app
        INFOPLIST_FILE: Sources/CosyPostsAdmin/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/CosyPostsAdmin/CosyPostsAdmin.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.photos-library: true
        com.apple.security.application-groups:
          - group.me.byjp.cosyposts
    dependencies:
      - target: ShareExtension
        embed: true

  ContractTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - Tests/ContractTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.byjp.cosyposts.contracttests
    dependencies:
      - package: PactSwift
    scheme:
      testTargets:
        - ContractTests
      environmentVariables:
        PACT_OUTPUT_DIR: $(SRCROOT)/../contracts

  ShareExtension:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.byjp.cosyposts.app.share
        INFOPLIST_FILE: Sources/ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Sources/ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.me.byjp.cosyposts
