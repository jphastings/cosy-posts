baseURL: "/"
languageCode: en
title: Cosy Posts

params:
  siteName: Cosy Posts

disableKinds:
  - taxonomy
  - term
  - section

markup:
  goldmark:
    renderer:
      unsafe: true

mediaTypes:
  text/csv:
    suffixes:
      - csv

security:
  funcs:
    getenv:
      - "^HUGO_"
      - "^CI$"
      - "^CAN_POST_CSV$"

server:
  port: 8889
